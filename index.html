  <script>
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("artDB", 1);

        request.onupgradeneeded = function (event) {
          const db = event.target.result;
          db.createObjectStore("files");
        };

        request.onsuccess = function (event) {
          resolve(event.target.result);
        };

        request.onerror = function (event) {
          reject(event.target.error);
        };
      });
    }

    function getFromIDB(key) {
      return new Promise(async (resolve, reject) => {
        const db = await openDB();
        const tx = db.transaction("files", "readonly");
        const store = tx.objectStore("files");
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function putInIDB(key, value) {
      return new Promise(async (resolve, reject) => {

        const db = await openDB();
        const tx = db.transaction("files", "readwrite");
        const store = tx.objectStore("files");

        const req = store.put(value, key);

        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);

      });
    }

    function deleteFromIDB(key) {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("artDB", 1); 

        request.onerror = () => reject(request.error);

        request.onsuccess = () => {
          const db = request.result;

          const tx = db.transaction("files", "readwrite"); 
          const store = tx.objectStore("files");

          const deleteReq = store.delete(key);

          deleteReq.onsuccess = () => resolve(true);
          deleteReq.onerror = () => reject(deleteReq.error);
        };
      });
    }

    function clearModal() {
      document.getElementById("modalOverlay").style.display = 'none';
      window.location.hash = "";
    }

    async function setModal(fileid) {
      var db = await getDB();

      var modal = db.exec("select * from pictures where fileid = '" + fileid + "'");
      var sizes = db.exec("select * from sizes where fileid = '" + fileid + "'");

      const select = document.getElementById("modalSizes");
      select.innerHTML = "";

        option.textContent = sizes[0].values[k][2];
        option.value = sizes[0].values[k][3];
        select.appendChild(option);
      }

      document.getElementById("modalTitle").innerText = modal[0].values[0][2];
      document.getElementById("modalImage").innerHTML = "<img loading='lazy' src='" + modal[0].values[0][1] + "' style='min-width:400px; min-height:400px;' />";
      document.getElementById("modalTags").innerText = modal[0].values[0][3];
      document.getElementById("modalCollection").innerText = modal[0].values[0][4];
      document.getElementById("modalOverlay").style.display = 'flex';
      window.location.hash = fileid;
    }

    function loadContact() {

    function clearContact() {

    async function loadSitemap() {

      var pics = db.exec("select * from pictures order by name");

      if (!window.SITEMAP) {

          item.className = "sitemapRow";

          document.getElementById("sitemapBox").appendChild(item);
        }

        window.SITEMAP = true;
      }
      document.getElementById("sitemapOverlay").style.display = 'flex';
      window.location.hash = "#sitemap";
    }

    function clearSitemap() {
      document.getElementById("sitemapOverlay").style.display = 'none';
      window.location.hash = "";
    }

    async function loadSQL() {

      })]);

      window.SQL = SQL;
    }

    function redirectToBuy() {
      var select = document.getElementById("modalSizes");
      var url = select.options[select.selectedIndex].value;
      window.open(url, "_blank");
    }
  </script>

  <script>
    function clearSearch() {
      document.getElementById("searchResults").style.display = "none";
    }

    async function decompressBytes(bytes) {
      const ds = new DecompressionStream("gzip");
      const stream = new Blob([bytes]).stream().pipeThrough(ds);
      const buffer = await new Response(stream).arrayBuffer();
      return new Uint8Array(buffer);
    }

    function uint8ArrayToBase64(uint8Array) {
      let binaryString = '';
      for (let i = 0; i < uint8Array.length; i++) {
        binaryString += String.fromCharCode(uint8Array[i]);
      }
      return btoa(binaryString); 
    }

    function base64ToUint8Array(base64) {
      const binaryString = atob(base64); 
      const length = binaryString.length;
      const bytes = new Uint8Array(length);
      for (let i = 0; i < length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes;
    }

    async function getDB() {
      let db;

      const headResp = await fetch("/data.db.gz", { method: "HEAD" });

      const serverLastModified = headResp.headers.get("Last-Modified");

      const localLastModified = localStorage.getItem("db_last_modified");

      if (serverLastModified !== localLastModified) {
        console.log("DB changed on server. Invalidating cache...");

        await deleteFromIDB("db");
        localStorage.setItem("db_last_modified", serverLastModified);
      }

      let cached = await getFromIDB("db");

      if (!cached) {
        console.log("Fetching fresh DB...");

        const response = await fetch("/data.db.gz");
        const arrayBuffer = await response.arrayBuffer();
        const byteArray = new Uint8Array(arrayBuffer);

        const fin = await decompressBytes(byteArray);

        await putInIDB("db", fin);

        db = new window.SQL.Database(fin);
        window.DB = db;
      } else {
        if (window.DB == null) {
          db = new window.SQL.Database(cached);
          window.DB = db;
        } else {
          db = window.DB;
        }
      }

      return db;
    }

    function searchTag(element) {
      document.getElementById("searchText").value = element.innerText;
      element.parentElement.style.display = 'none';
      search();
    }

    function searchCollection(element) {
      document.getElementById("searchText").value = element.innerText;
      element.parentElement.style.display = 'none';
      search();
    }

    async function loadPage() {
      [SQL] = await Promise.all([initSqlJs({
        locateFile: f => "/" + f
      })]);

      window.SQL = SQL;

      var db = await getDB();

      var collectionsbulk = db.exec("SELECT DISTINCT collection from pictures order by collection");
      var tagsbulk = db.exec("select distinct tags from pictures");
      var homeBulk = db.exec("SELECT * from homepage");

      var featuredCollection = homeBulk[0].values[0][0];
      var featuredImages = homeBulk[0].values[0][1].split(",");

      var carouselBulk = db.exec("select * from pictures where collection = '" + featuredCollection + "' limit 10");

      document.getElementById("featuredTitle").innerHTML = "Featured Collection:&nbsp;" + featuredCollection;

      var carousel = document.getElementById("carouselTrack");

      for (let i = 0; i < carouselBulk[0].values.length; i++) {

        var author = carouselBulk[0].values[i][2].split(/ - (.*)/)[0];
        var title = carouselBulk[0].values[i][2].split(/ - (.*)/)[1];
        var fileid = carouselBulk[0].values[i][0];

        const item = document.createElement("div");
        item.className = "carousel-item";
        item.addEventListener("click", function () {
          setModal(carouselBulk[0].values[i][0]);

        });
        item.innerHTML = "<br/><div class='collectionPicture'><div>" + author + "</div>"
          + "<img loading='lazy' src='" + carouselBulk[0].values[i][1] + "' height=300 />"
          + "<div>" + title + "</div></div><br/>";

        carousel.appendChild(item);
      }

      var fImages = document.getElementById("featured_pictures");

      for (let i = 0; i < featuredImages.length; i++) {
        if (i % 2 == 0) {
          fImages.appendChild(document.createElement('br'));
          fImages.appendChild(document.createElement('br'));
        }
        var picture = db.exec("select * from pictures where fileid='" + featuredImages[i] + "'");

        var author = picture[0].values[0][2].split(/ - (.*)/)[0];
        var title = picture[0].values[0][2].split(/ - (.*)/)[1];
        var fileid = picture[0].values[0][0];
        const item = document.createElement("div");

        item.addEventListener("click", function () {
          setModal(featuredImages[i]);
        });

        item.className = "featured_picture";
        item.innerHTML = "<div>" + author + "</div>"
          + "<img loading='lazy' src='" + picture[0].values[0][1] + "' />"
          + "<div>" + title + "</div>";

        fImages.appendChild(item);
      }

      var collections = [];
      for (let i = 0; i < collectionsbulk[0].values.length; i++) {
        collections.push(collectionsbulk[0].values[i][0]);
      }

      var div = document.getElementById("collectionMenu");
      for (let i = 0; i < collections.length; i++) {
        div.innerHTML += "<div class='collection' onclick='searchCollection(this)'>" + collections[i] + "</div>";
      }

      var tags = [];
      for (let i = 0; i < tagsbulk[0].values.length; i++) {
        tags = tags.concat(tagsbulk[0].values[i][0].split(","));
      }

      tags = tags.sort().filter(function (item, pos) { return tags.indexOf(item) == pos });

      div = document.getElementById("tagMenu");
      for (let i = 0; i < tags.length; i++) {
        div.innerHTML += "<div class='tag' onclick='searchTag(this)'>" + tags[i] + "</div>";
      }
    } 
  </script>

  <script>
    const track = document.getElementById("carouselTrack");
    const items = document.getElementsByClassName("carousel-item"); 

    let index = 0;

    document.querySelector(".next").onclick = () => {
      index++;
      if (index >= items.length) index = 0;
      update();
    };

    document.querySelector(".prev").onclick = () => {
      index--;
      if (index < 0) index = items.length - 1;
      update();
    };

    function update() {
      track.style.transform = `translateX(-${index * 100}%)`;
    }

    async function search() {
      var kw = document.getElementById("searchText").value.replaceAll("'", "");
      var db = await getDB();
      var test = db.exec("SELECT * from pictures where name LIKE '%" + kw + "%' or tags LIKE '%" + kw + "%' or collection LIKE '%" + kw + "%' order by name");

      var element = document.getElementById("results");
      element.innerHTML = "";
      for (let i = 0; i < test[0].values.length; i++) {
        var r = document.createElement("div");
        r.className = "result";
        r.innerHTML = "<div class='resultImage'><img loading='lazy' src='" + test[0].values[i][1] + "' height=50px /></div><div class='resultName'>" + test[0].values[i][2] + "</div>";
        r.addEventListener("click", () => {
          setModal(test[0].values[i][0]);

        });
        element.appendChild(r);
      }

      document.getElementById("searchResults").style.display = 'block';
    }

    window.addEventListener("load", async () => {
      const hash = window.location.hash;
      [SQL] = await Promise.all([initSqlJs({
        locateFile: f => "/" + f
      })]);

      window.SQL = SQL;
      var db = await getDB();

      if (hash.startsWith("#file_")) {
        const fileid = hash.replace("#", "");
        setModal(fileid);
      } else if (hash.startsWith("#collection_")) {
      } else if (hash.startsWith("#tag_")) {
      } else if (hash.startsWith("#contact")) {
        loadContact();
      } else if (hash.startsWith("#sitemap")) {
        loadSitemap();
      }
    });
  </script>
