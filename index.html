<script type="module">

function decompressBlob(blob) {
  let ds = new DecompressionStream("gzip");
  let decompressedStream = blob.stream().pipeThrough(ds);
  return new Response(decompressedStream).blob();
}

function uint8ArrayToBase64(uint8Array) {
  let binaryString = '';
  // Convert each byte to its character representation
  for (let i = 0; i < uint8Array.length; i++) {
    binaryString += String.fromCharCode(uint8Array[i]);
  }
  return btoa(binaryString); // Encode binary string to Base64
}

function base64ToUint8Array(base64) {
  const binaryString = atob(base64); // Decode Base64 to a binary string
  const length = binaryString.length;
  const bytes = new Uint8Array(length);
  for (let i = 0; i < length; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }
  return bytes;
}

const SQL = await initSqlJs({
  locateFile: file => `/${file}`
});

let db;

if (localStorage.getItem('db') == null) {
  var buf = await fetch("/data.db").then(res => res.arrayBuffer());
  var arr = new Uint8Array(buf);
  db = new SQL.Database(arr);
  localStorage.setItem('db', uint8ArrayToBase64(arr));
} else {
  var str = localStorage.getItem('db');
  db = new SQL.Database(base64ToUint8Array(str));
}

var collectionsbulk = db.exec("SELECT DISTINCT collection from pictures");
var tagsbulk = db.exec("select distinct tags from pictures");
var homeBulk = db.exec("SELECT * from homepage");

var featuredCollection = homeBulk[0].values[0][0];
var featuredImages = homeBulk[0].values[0][1].split(",");

var carouselBulk = db.exec("select * from pictures where collection = '"+featuredCollection+"' limit 10");

document.getElementById("featuredTitle").innerHTML = "Featured Collection:&nbsp;"+featuredCollection;

var carousel = document.getElementById("carouselTrack");

for (let i = 0; i < carouselBulk[0].values.length; i++) {

var author = carouselBulk[0].values[i][2].split(/ - (.*)/)[0];
var title = carouselBulk[0].values[i][2].split(/ - (.*)/)[1];

 const item = document.createElement("div");
  item.className = "carousel-item";
  item.innerHTML = "<br/><div class='collectionPicture'><div>"+author+"</div>"
                   +"<img src='"+carouselBulk[0].values[i][1]+"' height=300 />"
                   +"<div>"+title+"</div></div><br/>";

  carousel.appendChild(item);
}

var fImages = document.getElementById("featured_pictures");

for (let i = 0; i < featuredImages.length; i++) {
  if (i%2==0) {
    fImages.appendChild(document.createElement('br'));
    fImages.appendChild(document.createElement('br'));
   }
  var picture = db.exec("select * from pictures where fileid='"+featuredImages[i]+"'");

var author = picture[0].values[0][2].split(/ - (.*)/)[0];
var title = picture[0].values[0][2].split(/ - (.*)/)[1];
const item = document.createElement("div");
  item.className = "featured_picture";
  item.innerHTML = "<div>"+author+"</div>"
                   +"<img src='"+picture[0].values[0][1]+"' />"
                   +"<div>"+title+"</div>";

  fImages.appendChild(item);
}

var collections=[];
for (let i = 0; i < collectionsbulk.length; i++) {
  collections.push(collectionsbulk[i].values[0][0]);
}

var div = document.getElementById("collectionMenu");
for (let i = 0; i < collections.length; i++) {
  div.innerHTML += "<div class='collection'>"+collections[i]+"</div>";  
}

var tags=[];
for (let i = 0; i < tagsbulk.length; i++) {
  tags = tags.concat(tagsbulk[i].values[0][0].split(","));
}

tags=tags.sort().filter(function (item, pos) {return tags.indexOf(item) == pos});

div = document.getElementById("tagMenu");
for (let i = 0; i < tags.length; i++) {
  div.innerHTML += "<div class='tag'>"+tags[i]+"</div>";
}
 
</script>

<script>
const track = document.getElementById("carouselTrack");
const items = document.getElementsByClassName("carousel-item"); //document.querySelectorAll(".carousel-item");

let index = 0;

document.querySelector(".next").onclick = () => {
  index++;
  if (index >= items.length) index = 0;
  update();
};

document.querySelector(".prev").onclick = () => {
  index--;
  if (index < 0) index = items.length - 1;
  update();
};

function update() {
  track.style.transform = `translateX(-${index * 100}%)`;
}
</script>
