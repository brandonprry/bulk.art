<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bulk Fine Art</title>

<body>

<script src='/sql-wasm.js'></script>
  <script type="module">

function uniq(a) {
    return a.sort().filter(function(item, pos, ary) {
        return !pos || item != ary[pos - 1];
    });
}

const sqlPromise = initSqlJs({
  locateFile: file => `/${file}`
});
const dataPromise = fetch("/data.db").then(res => res.arrayBuffer());
const [SQL, buf] = await Promise.all([sqlPromise, dataPromise])
const db = new SQL.Database(new Uint8Array(buf));
  const contents = db.exec("SELECT * FROM pictures");
console.log(contents);
</script>


<script>
function showRandomLocalStorageObject() {

    const keys = Object.keys(localStorage);

    if (keys.length === 0) {
        alert("No objects in localStorage");
        return;
    }

    const randomKey = keys[Math.floor(Math.random() * keys.length)];
    const obj = JSON.parse(localStorage.getItem(randomKey));

    const modal = document.createElement("div");
    modal.style.position = "fixed";
    modal.style.top = "0";
    modal.style.left = "0";
    modal.style.width = "100%";
    modal.style.height = "100%";
    modal.style.background = "rgba(0,0,0,0.6)";
    modal.style.display = "flex";
    modal.style.alignItems = "center";
    modal.style.justifyContent = "center";
    modal.style.zIndex = "9999";

    const content = document.createElement("div");
    content.style.background = "white";
    content.style.padding = "20px";
    content.style.borderRadius = "8px";
    content.style.maxWidth = "600px";
    content.style.fontFamily = "monospace";

    content.innerHTML = `
        <h3>${randomKey}</h3>
        <pre>${obj["name"]}</pre>
        <button id="closeModal">Close</button>
    `;

    modal.appendChild(content);
    document.body.appendChild(modal);

    document.getElementById("closeModal").onclick = () => modal.remove();
}
</script>
<button onclick="showRandomLocalStorageObject()">Random Object</button>
</body>
</html>
