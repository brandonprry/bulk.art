<script>

function openDB() {
	return new Promise((resolve, reject) => {

			const request = indexedDB.open("artDB", 1);

			request.onupgradeneeded = function (event) {
			const db = event.target.result;
			db.createObjectStore("files");
			};

			request.onsuccess = function (event) {
			resolve(event.target.result);
			};

			request.onerror = function (event) {
			reject(event.target.error);
			};

			});
}


function getFromIDB(key) {
	return new Promise(async (resolve, reject) => {

			const db = await openDB();
			const tx = db.transaction("files", "readonly");
			const store = tx.objectStore("files");

			const req = store.get(key);

			req.onsuccess = () => resolve(req.result);
			req.onerror = () => reject(req.error);

			});
}


function putInIDB(key, value) {
	return new Promise(async (resolve, reject) => {

			const db = await openDB();
			const tx = db.transaction("files", "readwrite");
			const store = tx.objectStore("files");

			const req = store.put(value, key);

			req.onsuccess = () => resolve();
			req.onerror = () => reject(req.error);

			});
}

function decompressBlob(blob) {
	let ds = new DecompressionStream("gzip");
	let decompressedStream = blob.stream().pipeThrough(ds);
	return new Response(decompressedStream).blob();
}

function uint8ArrayToBase64(uint8Array) {
	let binaryString = '';
	// Convert each byte to its character representation
	for (let i = 0; i < uint8Array.length; i++) {
		binaryString += String.fromCharCode(uint8Array[i]);
	}
	return btoa(binaryString); // Encode binary string to Base64
}

function base64ToUint8Array(base64) {
	const binaryString = atob(base64); // Decode Base64 to a binary string
	const length = binaryString.length;
	const bytes = new Uint8Array(length);
	for (let i = 0; i < length; i++) {
		bytes[i] = binaryString.charCodeAt(i);
	}
	return bytes;
}

async function getDB() {

	let db;

	let cached = await getFromIDB("db");

	if (!cached) {

		const response = await fetch("/data.db");
		const arrayBuffer = await response.arrayBuffer();
		const byteArray = new Uint8Array(arrayBuffer);

		await putInIDB("db", byteArray);

		db = new window.SQL.Database(byteArray);
		window.DB = db;

	} else {

		if (window.DB == null) {

			db = new window.SQL.Database(cached);
			window.DB = db;

		} else {

			db = window.DB;

		}

	}

	return db;

}
