<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bulk Fine Art</title>
</head>
<body>

<script src='/sql-wasm.js'></script>
  <script>
    config = {
      locateFile: filename => `/${filename}`
    }
    // The `initSqlJs` function is globally provided by all of the main dist files if loaded in the browser.
    // We must specify this locateFile function if we are loading a wasm file from anywhere other than the current html page's folder.
    initSqlJs(config).then(function(SQL){
      //Create the database
      const db = new SQL.Database();
      // Run a query without reading the results
      db.run("CREATE TABLE test (col1, col2);");
      // Insert two rows: (1,111) and (2,222)
      db.run("INSERT INTO test VALUES (?,?), (?,?)", [1,111,2,222]);

      // Prepare a statement
      const stmt = db.prepare("SELECT * FROM test WHERE col1 BETWEEN $start AND $end");
      stmt.getAsObject({$start:1, $end:1}); // {col1:1, col2:111}

      // Bind new values
      stmt.bind({$start:1, $end:2});
      while(stmt.step()) { //
        const row = stmt.getAsObject();
        console.log('Here is a row: ' + JSON.stringify(row));
      }
    });

</script>

<script>
async function loadData() {


    localStorage.clear();

    try {
        const response = await fetch("data.json");
        const data = await response.json();

        if (!Array.isArray(data)) {
            console.error("JSON must be an array");
            return;
        }

        data.forEach((obj, index) => {
            localStorage.setItem(obj.fileid, JSON.stringify(obj));
        });

        console.log("Objects stored in localStorage:", data.length);
    } catch (err) {
        console.error("Failed to load JSON:", err);
    }
}

loadData();
</script>

<script>
function showRandomLocalStorageObject() {

    const keys = Object.keys(localStorage);

    if (keys.length === 0) {
        alert("No objects in localStorage");
        return;
    }

    const randomKey = keys[Math.floor(Math.random() * keys.length)];
    const obj = JSON.parse(localStorage.getItem(randomKey));

    const modal = document.createElement("div");
    modal.style.position = "fixed";
    modal.style.top = "0";
    modal.style.left = "0";
    modal.style.width = "100%";
    modal.style.height = "100%";
    modal.style.background = "rgba(0,0,0,0.6)";
    modal.style.display = "flex";
    modal.style.alignItems = "center";
    modal.style.justifyContent = "center";
    modal.style.zIndex = "9999";

    const content = document.createElement("div");
    content.style.background = "white";
    content.style.padding = "20px";
    content.style.borderRadius = "8px";
    content.style.maxWidth = "600px";
    content.style.fontFamily = "monospace";

    content.innerHTML = `
        <h3>${randomKey}</h3>
        <pre>${obj["name"]}</pre>
        <button id="closeModal">Close</button>
    `;

    modal.appendChild(content);
    document.body.appendChild(modal);

    document.getElementById("closeModal").onclick = () => modal.remove();
}
</script>
<button onclick="showRandomLocalStorageObject()">Random Object</button>
</body>
</html>
